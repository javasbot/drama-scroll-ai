# Application
spring.application.name=drama-scroll-java
server.port=8080

# ==============================================
# Supabase PostgreSQL
# 本地开发使用 Docker，生产环境使用 Supabase
# ==============================================
spring.datasource.url=${SUPABASE_JDBC_URL:jdbc:postgresql://localhost:5432/drama_scroll}
spring.datasource.username=${SUPABASE_DB_USER:drama_user}
spring.datasource.password=${SUPABASE_DB_PASSWORD:drama_pass_2024}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

# ==============================================
# Upstash Redis
# 本地开发使用 Docker (6380)，生产环境使用 Upstash
# ==============================================
spring.data.redis.host=${UPSTASH_REDIS_HOST:localhost}
spring.data.redis.port=${UPSTASH_REDIS_PORT:6380}
spring.data.redis.password=${UPSTASH_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${UPSTASH_REDIS_SSL:false}
spring.data.redis.timeout=3000

# ==============================================
# Sentry 错误追踪
# ==============================================
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=0.3
sentry.environment=${SPRING_PROFILES_ACTIVE:development}

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,${FRONTEND_URL:}

# Engagement settings
app.engagement.redis-debounce-ttl=5
app.engagement.flush-interval=10000
app.engagement.batch-size=100

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.com.dramascroll=DEBUG
logging.level.org.springframework.data.redis=WARN
